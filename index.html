<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SnapTik • TikTok Downloader</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; }
    </style>
</head>
<body class="bg-zinc-950 text-white pb-24">

    <div class="max-w-lg mx-auto px-4 pt-8">
        <!-- Header -->
        <div class="flex items-center justify-center gap-x-3 mb-8">
            <div class="w-11 h-11 bg-emerald-500 rounded-2xl flex items-center justify-center">
                <i class="fa-brands fa-tiktok text-3xl"></i>
            </div>
            <div>
                <h1 class="text-4xl font-bold tracking-tighter">SnapTik</h1>
                <p class="text-emerald-400 text-sm -mt-1">Download TikTok Videos</p>
            </div>
        </div>

        <!-- Main Card -->
        <div class="bg-zinc-900 border border-zinc-800 rounded-3xl p-7">
            
            <!-- Input -->
            <div>
                <label class="text-sm font-medium text-zinc-400 mb-2 block">TikTok Video Link</label>
                <div class="flex gap-2">
                    <input id="url" type="text" 
                           class="flex-1 bg-zinc-950 border border-zinc-700 focus:border-emerald-500 rounded-2xl px-5 py-4 text-sm outline-none"
                           placeholder="https://www.tiktok.com/@username/video/1234567890123456789">
                    <button onclick="startProcess()" 
                            class="bg-emerald-500 hover:bg-emerald-600 px-7 rounded-2xl font-semibold flex items-center gap-x-2 text-sm">
                        <i class="fa-solid fa-download"></i>
                        <span>Download</span>
                    </button>
                </div>
            </div>

            <!-- Loading -->
            <div id="loading" class="hidden mt-6">
                <div class="bg-zinc-950 border border-zinc-800 rounded-2xl p-5">
                    <div class="flex items-center gap-x-3 mb-4">
                        <div class="w-5 h-5 border-2 border-emerald-500 border-t-transparent rounded-full animate-spin"></div>
                        <span id="loading-text" class="font-medium">Fetching video info...</span>
                    </div>
                </div>
            </div>

            <!-- Result -->
            <div id="result" class="hidden mt-6">
                <div class="bg-zinc-950 border border-zinc-800 rounded-2xl p-5">
                    <div class="flex gap-4">
                        <div class="w-20 h-20 bg-zinc-800 rounded-xl overflow-hidden flex-shrink-0">
                            <img id="thumb" class="w-full h-full object-cover" alt="">
                        </div>
                        <div class="flex-1 min-w-0">
                            <div id="title" class="font-semibold text-sm line-clamp-2"></div>
                            <div id="author" class="text-emerald-400 text-xs mt-1"></div>
                        </div>
                    </div>

                    <div class="mt-5 space-y-2">
                        <button onclick="downloadWithAd('hd')" 
                                class="w-full bg-emerald-500 hover:bg-emerald-600 py-3 rounded-2xl font-semibold flex items-center justify-center gap-x-2 text-sm">
                            <i class="fa-solid fa-video"></i>
                            <span>Download HD Video</span>
                        </button>
                        
                        <button onclick="downloadWithAd('audio')" 
                                class="w-full bg-zinc-800 hover:bg-zinc-700 border border-zinc-700 py-3 rounded-2xl font-semibold flex items-center justify-center gap-x-2 text-sm">
                            <i class="fa-solid fa-music"></i>
                            <span>Download Audio (MP3)</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- ========== REAL ADMOB BANNER (BOTTOM) ========== -->
    <div class="fixed bottom-0 left-0 right-0 bg-zinc-900 border-t border-zinc-700 z-40 p-2">
        <div class="max-w-lg mx-auto flex justify-center">
            <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js"></script>
<ins class="adsbygoogle"
     style="display:block"
     data-ad-client="ca-pub-9263842836752356"
     data-ad-slot="3725089174"
     data-ad-format="auto"></ins>
https://your-site-link.com
<script>
     (adsbygoogle = window.adsbygoogle || []).push({});
</script>
        </div>
    </div>

    <!-- ========== REAL ADMOB INTERSTITIAL MODAL ========== -->
    <div id="ad-modal" onclick="if (event.target.id === 'ad-modal') hideAdModal()" 
         class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-50 p-4">
        <div onclick="event.stopImmediatePropagation()" 
             class="bg-white w-full max-w-md rounded-3xl overflow-hidden shadow-2xl">
            
            <!-- Modal Header -->
            <div class="bg-zinc-100 px-5 py-3 flex items-center justify-between">
                <span class="text-sm font-semibold text-zinc-600">Advertisement</span>
                <button onclick="hideAdModal()" class="text-zinc-400 hover:text-black text-xl">×</button>
            </div>

            <!-- Real AdMob Ad Inside Modal -->
<div class="fixed bottom-0 left-0 right-0 bg-zinc-900 border-t border-zinc-700 z-40 p-2">
    <div class="max-w-lg mx-auto flex justify-center">

        <ins class="adsbygoogle"
             style="display:block"
             data-ad-client="ca-pub-9263842836752356"
             data-ad-slot="3725089174"
             data-ad-format="auto"
             data-full-width-responsive="true"></ins>

        <script>
            (adsbygoogle = window.adsbygoogle || []).push({});
        </script>

    </div>
</div>
            <!-- Continue Button -->
            <div class="p-4 border-t">
                <button id="continue-btn"
                        onclick="continueAfterAd()"
                        class="w-full bg-emerald-500 hover:bg-emerald-600 text-white py-3 rounded-2xl font-semibold disabled:opacity-50"
                        disabled>
                    Continue to Download <span id="countdown">(5)</span>
                </button>
            </div>
        </div>
    </div>

    <script>
        let currentType = '';

        function startProcess() {
            const url = document.getElementById('url').value.trim();
            if (!url.includes('tiktok.com')) {
                alert("Please paste a valid TikTok link");
                return;
            }

            document.getElementById('loading').classList.remove('hidden');
            document.getElementById('result').classList.add('hidden');

            setTimeout(() => {
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('result').classList.remove('hidden');

                document.getElementById('thumb').src = "https://picsum.photos/id/1011/80/80";
                document.getElementById('title').innerText = "TikTok Video Ready";
                document.getElementById('author').innerText = "No watermark • HD available";
            }, 1400);
        }

        function downloadWithAd(type) {
            currentType = type;
            const modal = document.getElementById('ad-modal');
            const continueBtn = document.getElementById('continue-btn');
            const countdownEl = document.getElementById('countdown');

            modal.classList.remove('hidden');
            modal.classList.add('flex');

            continueBtn.disabled = true;
            let seconds = 5;
            countdownEl.innerText = `(${seconds})`;

            const timer = setInterval(() => {
                seconds--;
                countdownEl.innerText = `(${seconds})`;
                if (seconds <= 0) {
                    clearInterval(timer);
                    continueBtn.disabled = false;
                    countdownEl.innerText = '';
                    continueBtn.innerHTML = 'Continue to Download';
                }
            }, 1000);
        }

        function hideAdModal() {
            document.getElementById('ad-modal').classList.add('hidden');
            document.getElementById('ad-modal').classList.remove('flex');
        }

        async function continueAfterAd() {
            hideAdModal();

            const url = document.getElementById('url').value.trim();
            const encoded = encodeURIComponent(url);

            try {
                const res = await fetch(`https://tikwm.com/api/?url=${encoded}`);
                const data = await res.json();

                if (data.code === 0 && data.data) {
                    let downloadUrl = currentType === 'hd' 
                        ? (data.data.hdplay || data.data.play) 
                        : data.data.music;

                    if (downloadUrl) {
                        const link = document.createElement('a');
                        link.href = downloadUrl;
                        link.download = currentType === 'hd' ? 'tiktok_hd.mp4' : 'tiktok_audio.mp3';
                        document.body.appendChild(link);
                        link.click();
                        document.body.removeChild(link);
                        return;
                    }
                }
            } catch (e) {}

            alert("Download started!");
        }
    </script>
</body>
</html>
